# Fly.io config for the PitchMarket backend.
#
#   fly launch --no-deploy            # once; pick a region near your users
#   fly volumes create pitchdata -s 1
#   fly secrets set DATABASE_URL=... SOLANA_RPC_URL=... GEMINI_API_KEY=... \
#     OPERATOR_KEYPAIR_JSON="$(cat ~/.config/solana/id.json)" \
#     CORS_ORIGIN=https://<your-frontend>.vercel.app
#   fly deploy
app = "pitchmarket-backend"
primary_region = "iad"

[build]
  dockerfile = "Dockerfile"

[env]
  PITCHMARKET_ADDR = ":8080"
  FEED_PROVIDER = "txodds"
  TXODDS_COMPETITION = "72"
  TXODDS_CACHE = "/data/txline-credentials.json"
  MM_BOT = "on"

[mounts]
  source = "pitchdata"
  destination = "/data"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = false   # long-running: feeds + crank must not sleep
  auto_start_machines = true
  min_machines_running = 1

[[vm]]
  size = "shared-cpu-1x"
  memory = "512mb"
